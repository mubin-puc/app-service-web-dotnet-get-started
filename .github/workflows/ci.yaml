name: Build and Deploy ASP.NET Web App

on:
  push:
    branches:
      - main     # Triggers the pipeline on commits to the main branch
  workflow_dispatch: # Allows manual pipeline triggering from the GitHub UI

# env:
#   AZURE_WEBAPP_NAME: 'your-app-service-name'    # Change this to your Azure Web App name
#   BUILD_CONFIGURATION: 'Release'

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
    # 1. Check out the source code
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Add MSBuild to the environment path
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. Add NuGet to the environment path for package restoration
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    # 4. Restore the NuGet dependencies required for the project
    - name: Restore NuGet Packages
      run: nuget restore aspnet-get-started.sln  # Replace with the actual .sln file name if it differs

    # 5. Build the project and output a Web Deploy zip package
    - name: Build and Package Web App
      run: |
        msbuild aspnet-get-started.sln /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="${{ github.workspace }}\build-artifacts"

    # 6. Upload the built web package so it can be referenced by the deploy job
    - name: Upload Artifact for Deployment
      uses: actions/upload-artifact@v4
      with:
        name: webapp-package
        path: ${{ github.workspace }}\build-artifacts\*.zip

